<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제출 완료 - 메디헬퍼스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 16px;
  }
  .thanks-container {
    background: #fff;
    max-width: 100%;
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
    padding: 60px 32px;
  }
  .check-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
  }
  .check-icon svg {
    width: 40px;
    height: 40px;
    fill: none;
    stroke: #fff;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  h1 {
    font-size: 24px;
    color: #1a73e8;
    margin-bottom: 16px;
  }
  .message {
    font-size: 16px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .contact {
    background: #f8faff;
    border: 1px solid #e3ecf7;
    border-radius: 10px;
    padding: 20px;
    display: inline-block;
    font-size: 14px;
    color: #666;
    line-height: 1.8;
  }
  .contact strong {
    color: #333;
  }
</style>
</head>
<body>

<div class="thanks-container">
  <div class="check-icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
  </div>
  <h1>이력서가 정상적으로 접수되었습니다</h1>
  <p class="message">
    소중한 이력서를 보내주셔서 감사합니다.<br>
    담당 헤드헌터가 검토 후 빠른 시일 내에 연락드리겠습니다.
  </p>
  <div class="contact">
    <strong>메디헬퍼스 의사헤드헌팅사업부</strong><br>
    전화 : 010-2435-5463<br>
    이메일 : hr@medihelpers.co.kr
  </div>
</div>

</body>
</html>
